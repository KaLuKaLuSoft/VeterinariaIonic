<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Use a smaller viewBox area for the contents to handle the outer zoom -->
  <g transform="scale(0.7) translate(43, 43)">
    <defs>
      <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#5ba19b;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#4a847f;stop-opacity:1" />
      </linearGradient>
    </defs>
    <circle cx="100" cy="100" r="95" fill="url(#gTeal)" />
    <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="2" stroke-dasharray="10 5" opacity="0.4"/>
    
    <!-- Bird (Top) -->
    <path d="M100,55 Q115,40 135,55 L125,85 L100,85 Z" fill="white" opacity="0.95" />
    <path d="M135,55 L150,50" stroke="white" stroke-width="4" stroke-linecap="round" />
    <circle cx="120" cy="53" r="3" fill="#4a847f" />

    <!-- Turtle (Left) -->
    <path d="M35,115 C35,80 100,80 100,115 Z" fill="white" opacity="0.85" />
    <circle cx="105" cy="110" r="10" fill="white" />
    <circle cx="109" cy="107" r="2" fill="#4a847f" />

    <!-- Rabbit/Hamster (Right) -->
    <circle cx="145" cy="130" r="32" fill="white" opacity="0.9" />
    <path d="M130,110 L135,75 L145,110 Z" fill="white" opacity="0.9" /> <!-- Ear L -->
    <path d="M160,110 L155,75 L145,110 Z" fill="white" opacity="0.9" /> <!-- Ear R -->
    <circle cx="130" cy="122" r="3" fill="#4a847f" />
    <circle cx="160" cy="122" r="3" fill="#4a847f" />
  </g>
</svg>